<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Langton's Ant Simulation</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div style="text-align: left;">
                    <h1>Langton's Ant 🐜</h1>
                    <p>Emergent Complexity & Agent-Based Modeling</p>
                </div>
                <button id="themeToggle" class="btn" style="background: transparent; border: 1px solid var(--text-secondary); color: var(--text-primary);">🌓 Theme</button>
            </div>
        </header>

        <main>
            <div class="canvas-container">
                <canvas id="antCanvas" width="800" height="800"></canvas>
            </div>
            
            <div class="controls">
                <div class="control-group">
                    <button id="playBtn" class="btn primary">Play</button>
                    <button id="pauseBtn" class="btn">Pause</button>
                    <button id="resetBtn" class="btn danger">Reset</button>
                </div>
                
                <div class="control-group slider-group">
                    <label for="speedSlider">Speed: <span id="speedValue">10</span> steps/frame</label>
                    <input type="range" id="speedSlider" min="1" max="1000" value="10">
                </div>
                
                <div class="stats">
                    <p>Step: <span id="stepCounter">0</span> / 0</p>
                </div>
            </div>
        </main>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
